<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Accesible</title>
</head>
<body>

    <div class="formulario-contenedor">
        <h2>Registro de Usuario</h2>
        <p>Este formulario se puede completar usando únicamente el teclado.</p>
        
        
        <form id="miFormulario">
            
            <div class="grupo-form">
                <!-- Atributo 'for' en label coincide con el 'id' del input -->
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required aria-required="true">
            </div>
            
            <div class="grupo-form">
                <label for="email">Correu electrónico:</label>
                <input type="email" id="email" name="email" required aria-required="true">
            </div>
            
            <div class="grupo-form">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required aria-required="true">
            </div>
            
            <!-- Botón de tipo submit. Se activará con la tecla Enter al estar enfocado -->
            <button type="submit" id="btn-enviar">Enviar</button>
            
        </form>

        <div id="mensaje-exito" role="alert">
            ¡Formulario enviado correctamente mediante el teclado!
        </div>
    </div>

    <script src="javaScript.js"></script>
</body>
</html>
